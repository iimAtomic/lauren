<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accueil — Maison Mona</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body class="page-home">
    <div id="page-transition" class="page-transition" aria-hidden="true"></div>

    <header class="site-header">
      <div class="header-inner header-inner--home">
        <a href="/" class="logo">maison mona</a>
        <nav class="nav-main" aria-label="Navigation principale">
          <a href="/" aria-current="page">Accueil</a>
          <a href="/boutique.html">Boutique</a>
          <a href="/le-cercle.html">Le Cercle</a>
          <a href="#panier" id="nav-panier">Panier</a>
        </nav>
        <div class="header-actions">
          <div class="cart-wrap">
            <button type="button" class="icon-btn" id="header-cart-btn" aria-label="Panier">
              🛍
              <span class="cart-badge" id="cart-count">0</span>
            </button>
            <span id="cart-total-label">0 CFA</span>
          </div>
        </div>
      </div>
    </header>

    <section class="hero-fashion" aria-label="Collection mode">
      <div class="hero-fashion-visual">
        <div class="hero-fashion-col hero-fashion-col--tall">
          <img
            id="hero-fashion-img-0"
            src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&w=900&q=85"
            alt=""
            width="900"
            height="1350"
            fetchpriority="high"
          />
        </div>
        <div class="hero-fashion-col hero-fashion-col--stack">
          <div class="hero-fashion-cell">
            <img
              id="hero-fashion-img-1"
              src="https://images.unsplash.com/photo-1509631179647-0177331693ae?auto=format&fit=crop&w=800&q=85"
              alt=""
              width="800"
              height="1000"
            />
          </div>
          <div class="hero-fashion-cell">
            <img
              id="hero-fashion-img-2"
              src="https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=800&q=85"
              alt=""
              width="800"
              height="1000"
            />
          </div>
        </div>
        <div class="hero-fashion-col hero-fashion-col--tall hero-fashion-col--end">
          <img
            id="hero-fashion-img-3"
            src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?auto=format&fit=crop&w=900&q=85"
            alt=""
            width="900"
            height="1350"
          />
        </div>
      </div>
      <div class="hero-fashion-veil" aria-hidden="true"></div>
      <div class="hero-fashion-cta">
        <a href="/boutique.html" class="btn-hero-collection">Accéder à la collection</a>
      </div>
    </section>

    <div id="cart-backdrop" class="cart-backdrop" hidden></div>
    <aside
      id="cart-panel"
      class="cart-panel"
      aria-labelledby="cart-title"
      aria-hidden="true"
    >
      <div class="cart-panel-head">
        <h2 id="cart-title" class="cart-title">Panier</h2>
        <button type="button" class="cart-close" id="cart-close" aria-label="Fermer le panier">
          ×
        </button>
      </div>
      <div id="cart-empty" class="cart-empty">Votre panier est vide.</div>
      <div id="cart-lines" class="cart-lines" role="list"></div>
      <div class="cart-panel-foot">
        <p id="cart-wa-hint" class="cart-wa-hint" hidden></p>
        <div class="cart-total-row">
          <span>Total</span>
          <strong id="cart-panel-total">0 CFA</strong>
        </div>
        <button type="button" class="btn-whatsapp" id="cart-whatsapp-btn" disabled>
          Précommander
        </button>
      </div>
    </aside>

    <script src="/js/shop.js"></script>
    <script src="/js/home-cta.js"></script>
  </body>
</html>
